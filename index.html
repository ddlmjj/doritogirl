<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorito Girl</title>
    <style>

      @font-face {
        font-family: 'PoliceScore';
        src: url('./font.woff2') format('woff2'); 
        font-weight: normal;
        font-style: normal;
      }

      body {
        background-image: url('./back.png');
        background-size:auto;
      }

      #score {
        position: absolute;
        top: 10px;
        left: 45%;
        color: white;
        font-family: PoliceScore, sans-serif;
        font-size: 30vW;
      }

      #body-image {
        position: absolute;
        width: 93%;
        height: auto;
        top: 30%;
        left: auto;
        right: auto;
      } 

      #eyes-image {
        position: absolute;
        transform: rotate(-90deg);
        top: 48%;
        width: 32%;
        height: auto;
        left: 36%;
      }

      #cookie-image {
        position:absolute;
        height: auto;
        width: 15%;
        top: 22%;
        left: 50%;
        transform: rotate(-90deg)
      }
    </style>
  </head>
  <body>
    <div id="score">0</div>
    <div id="cookie">
        <img src="./dorito.png" alt="Cookie" id="cookie-image">
    </div>
    <div id="body">
        
        <img src="./corp.png" alt="Body" id="body-image">
        <img src="./yeux.png" alt="Eyes" id="eyes-image">
    </div>
  </body>
</html>
